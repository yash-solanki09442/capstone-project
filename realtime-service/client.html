<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>WS Test Client</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 24px auto; }
      #log { border: 1px solid #ccc; padding: 12px; height: 300px; overflow: auto; white-space: pre-wrap; }
      input { width: 80%; padding: 8px; }
      button { padding: 8px 12px; }
    </style>
  </head>
  <body>
    <h2>WebSocket Test Client</h2>
    <div id="log"></div>
    <div style="margin-top: 12px;">
      <input id="msg" placeholder="Type a message..." />
      <button id="send">Send</button>
    </div>

    <script>
      const log = (s) => {
        const el = document.getElementById("log");
        el.textContent += s + "\n";
        el.scrollTop = el.scrollHeight;
      };

      const ws = new WebSocket("ws://localhost:8080");

      ws.onopen = () => log("[client] connected");
      ws.onmessage = (e) => log("[server] " + e.data);
      ws.onclose = () => log("[client] disconnected");
      ws.onerror = (e) => log("[client] error");

      document.getElementById("send").onclick = () => {
        const v = document.getElementById("msg").value;
        ws.send(v);
        document.getElementById("msg").value = "";
      };
    </script>
  </body>
</html>
